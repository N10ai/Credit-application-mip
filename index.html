<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MIP Credit Application</title>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Arial;
  background:#eef2f6;
}

.container{
  max-width:1000px;
  margin:20px auto;
  padding:0 12px;
}

/* ===== CARD UI ===== */
.card{
  background:#fff;
  border-radius:14px;
  padding:18px;
  margin-bottom:18px;
  border:1px solid #e5e7eb;
}

.section-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:12px;
}

/* ===== FIELDS ===== */
.field{
  display:flex;
  flex-direction:column;
  margin-bottom:12px;
}

.field label{
  font-size:11px;
  font-weight:600;
  margin-bottom:4px;
}

.field input,
.field textarea{
  border:1px solid #d1d5db;
  border-radius:8px;
  padding:10px;
  font-size:13px;
}

/* ===== GRID ===== */
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .grid-2,.grid-3{
    grid-template-columns:1fr;
  }
}

/* ===== BUTTON ===== */
button{
  padding:12px;
  background:#0f7cc2;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<form id="form">

<!-- HEADER -->
<div class="card">
  <h2 style="margin:0;text-align:center;">CREDIT APPLICATION</h2>
</div>

<!-- COMPANY -->
<div class="card">
  <div class="section-title">Company Info</div>

  <div class="field">
    <label>Legal Company Name</label>
    <input name="company">
  </div>

  <div class="grid-2">
    <div class="field">
      <label>Phone</label>
      <input name="phone">
    </div>

    <div class="field">
      <label>EIN</label>
      <input name="ein">
    </div>
  </div>

  <div class="field">
    <label>Address</label>
    <input name="address">
  </div>
</div>

<!-- 🔥 BUSINESS TYPE -->
<div class="card">
  <div class="section-title">Business Type</div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
    <label><input type="radio" name="type"> Corporation</label>
    <label><input type="radio" name="type"> LLC</label>
    <label><input type="radio" name="type"> Sole Prop</label>
    <label><input type="radio" name="type"> Partnership</label>
  </div>

  <div class="grid-2">
    <div class="field">
      <label>Owner Name</label>
      <input name="owner">
    </div>

    <div class="field">
      <label>SSN / EIN</label>
      <input name="ssn">
    </div>
  </div>

  <div class="grid-3">
    <div class="field">
      <label>City</label>
      <input name="city">
    </div>

    <div class="field">
      <label>State</label>
      <input name="state">
    </div>

    <div class="field">
      <label>ZIP</label>
      <input name="zip">
    </div>
  </div>
</div>

<!-- TRADE REFERENCES -->
<div class="card">
  <div class="section-title">Trade References</div>

  <div class="field">
    <label>Reference 1</label>
    <input name="ref1">
  </div>

  <div class="field">
    <label>Reference 2</label>
    <input name="ref2">
  </div>

  <div class="field">
    <label>Reference 3</label>
    <input name="ref3">
  </div>
</div>

<!-- SIGNATURE -->
<div class="card">
  <div class="section-title">Signature</div>

  <canvas id="sig" style="width:100%;height:160px;border:1px dashed #000"></canvas>

  <div class="field">
    <label>Name</label>
    <input name="signName">
  </div>

  <div class="field">
    <label>Email</label>
    <input name="signEmail">
  </div>
</div>

<button type="button" onclick="generate()">Generate PDF</button>

</form>

</div>

<script>

/* ===== SIGNATURE ===== */
const canvas=document.getElementById('sig');
const ctx=canvas.getContext('2d');

canvas.width=600;
canvas.height=160;

let drawing=false;
let saved=null;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=e=>{
  if(!drawing)return;
  ctx.lineTo(e.offsetX,e.offsetY);
  ctx.stroke();
  saved=canvas.toDataURL();
};

/* ===== PDF ===== */
function generate(){

const original=document.getElementById('form');
const clone=original.cloneNode(true);

/* inputs → text */
clone.querySelectorAll('input,textarea').forEach(el=>{
  let value=el.value || '';
  const div=document.createElement('div');
  div.textContent=value;
  div.style.borderBottom='1px solid #000';
  div.style.padding='2px 0';
  div.style.wordBreak='break-word';
  el.replaceWith(div);
});

/* signature */
const sig=clone.querySelector('#sig');
if(sig && saved){
  const img=document.createElement('img');
  img.src=saved;
  img.style.height='70px';
  sig.replaceWith(img);
}

/* container */
const wrap=document.createElement('div');
wrap.style.width='1000px';
wrap.appendChild(clone);
document.body.appendChild(wrap);

/* render fix */
wrap.offsetHeight;

setTimeout(()=>{
  html2pdf()
    .set({
      margin:0,
      filename:'credit-app.pdf',
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'letter'}
    })
    .from(wrap)
    .save()
    .then(()=>{
      document.body.removeChild(wrap);
    });
},500);

}

</script>

</body>
</html>
