<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIP Credit Application</title>

  <style>
    body { font-family: Arial; background:#eef2f6; margin:0; }
    .container { max-width:900px; margin:20px auto; }
    .doc { background:#fff; padding:20px; border-radius:12px; }
    .field-label { font-weight:bold; font-size:12px; }
    input { width:100%; padding:6px; margin-bottom:10px; }
    button { padding:10px 14px; cursor:pointer; }
    .signature-pad {
      width:100%;
      height:180px;
      border:1px dashed #888;
      border-radius:8px;
    }
    #typeSignatureLayer {
      display:none;
      align-items:center;
      justify-content:center;
      border:1px dashed #888;
      height:180px;
    }
  </style>
</head>

<body>

<div class="container">
<form id="creditAppForm" class="doc">

<h2>CREDIT APPLICATION</h2>

<label class="field-label">Company Name</label>
<input id="legalCompanyName" type="text" required>

<label class="field-label">Phone</label>
<input id="phoneNumber" type="text">

<label class="field-label">EIN</label>
<input id="ein" type="text">

<hr>

<h3>Signature</h3>

<label>
<input type="radio" name="sigmode" value="draw" checked> Draw
</label>

<label>
<input type="radio" name="sigmode" value="type"> Type
</label>

<div style="position:relative;height:180px">

<canvas id="signaturePad" class="signature-pad"></canvas>

<div id="typeSignatureLayer">
  <input id="typedSignature" type="text" placeholder="Type signature">
</div>

</div>

<br>

<button type="button" onclick="clearSignature()">Clear</button>
<button type="button" onclick="preparePdf()">Generate PDF</button>

</form>
</div>

<div id="pdf-content" style="display:none;"></div>

<script>
const canvas = document.getElementById('signaturePad');
const ctx = canvas.getContext('2d');

let drawing = false;
let savedSignatureData = null;

function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2;
}

function getPoint(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  return {x,y};
}

canvas.addEventListener('mousedown', e => {
  drawing = true;
  const p = getPoint(e);
  ctx.moveTo(p.x,p.y);
});

canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const p = getPoint(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
  savedSignatureData = canvas.toDataURL();
});

canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);

canvas.addEventListener('touchstart', e => {
  drawing = true;
  const p = getPoint(e);
  ctx.moveTo(p.x,p.y);
});

canvas.addEventListener('touchmove', e => {
  if (!drawing) return;
  const p = getPoint(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
  savedSignatureData = canvas.toDataURL();
});

canvas.addEventListener('touchend', () => drawing = false);

function clearSignature() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  savedSignatureData = null;
}

window.addEventListener('load', resizeCanvas);

document.querySelectorAll('input[name="sigmode"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const mode = document.querySelector('input[name="sigmode"]:checked').value;

    document.getElementById('signaturePad').style.display = mode === 'draw' ? 'block' : 'none';
    document.getElementById('typeSignatureLayer').style.display = mode === 'type' ? 'flex' : 'none';
  });
});

function preparePdf() {
  const form = document.getElementById('creditAppForm');
  if (!form.reportValidity()) return;

  const clone = form.cloneNode(true);

  const inputs = clone.querySelectorAll('input');

  inputs.forEach(el => {
    const span = document.createElement('span');
    span.innerText = el.value || '';
    el.replaceWith(span);
  });

  const sig = clone.querySelector('#signaturePad');

  if (sig && savedSignatureData) {
    const img = document.createElement('img');
    img.src = savedSignatureData;
    img.style.height = '80px';
    sig.replaceWith(img);
  }

  const container = document.getElementById('pdf-content');
  container.innerHTML = '';
  container.appendChild(clone);

  setTimeout(() => {
    html2pdf().from(container).save();
  }, 300);
}
</script>

</body>
</html>
