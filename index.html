<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MIP Credit Application</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#eef2f6;
}

.container {
  max-width:900px;
  margin:20px auto;
}

.doc {
  background:#fff;
  padding:20px;
  border-radius:12px;
}

.field-label {
  font-size:12px;
  font-weight:bold;
}

input {
  width:100%;
  padding:6px;
  margin-bottom:10px;
}

button {
  padding:10px;
  cursor:pointer;
}

.signature-pad {
  width:100%;
  height:180px;
  border:1px dashed #888;
  border-radius:8px;
}

#typeSignatureLayer {
  display:none;
  height:180px;
  align-items:center;
  justify-content:center;
  border:1px dashed #888;
}

#typedPreview {
  font-size:28px;
  font-family:cursive;
}

</style>
</head>

<body>

<div class="container">

<form id="creditAppForm" class="doc">

<h2>CREDIT APPLICATION</h2>

<label class="field-label">Company</label>
<input id="legalCompanyName" required>

<label class="field-label">Phone</label>
<input id="phoneNumber">

<label class="field-label">EIN</label>
<input id="ein">

<hr>

<h3>Signature</h3>

<label><input type="radio" name="sigmode" value="draw" checked> Draw</label>
<label><input type="radio" name="sigmode" value="type"> Type</label>

<div style="position:relative;height:180px">

<canvas id="signaturePad" class="signature-pad"></canvas>

<div id="typeSignatureLayer">
  <div>
    <input id="typedSignature" placeholder="Type your signature">
    <div id="typedPreview"></div>
  </div>
</div>

</div>

<br>

<button type="button" onclick="clearSignature()">Clear</button>
<button type="button" onclick="preparePdf()">Generate PDF</button>

</form>
</div>

<div id="pdf-content" style="display:none;"></div>

<script>
const canvas = document.getElementById('signaturePad');
const ctx = canvas.getContext('2d');

let drawing = false;
let savedSignatureData = null;

// Resize canvas correctly
function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  const width = canvas.offsetWidth;
  const height = canvas.offsetHeight;

  canvas.width = width * ratio;
  canvas.height = height * ratio;

  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#111';
}

// Get mouse/touch position
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  return { x, y };
}

// Drawing
function startDraw(e) {
  drawing = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  e.preventDefault();
}

function draw(e) {
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  savedSignatureData = canvas.toDataURL();
  e.preventDefault();
}

function stopDraw() {
  drawing = false;
}

// Events
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseleave', stopDraw);

canvas.addEventListener('touchstart', startDraw, { passive:false });
canvas.addEventListener('touchmove', draw, { passive:false });
canvas.addEventListener('touchend', stopDraw);

// Clear signature
function clearSignature() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  savedSignatureData = null;
}

// Initialize canvas
window.addEventListener('load', resizeCanvas);

// Toggle draw/type
document.querySelectorAll('input[name="sigmode"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const mode = document.querySelector('input[name="sigmode"]:checked').value;

    const canvasEl = document.getElementById('signaturePad');
    const typeLayer = document.getElementById('typeSignatureLayer');

    if (mode === 'draw') {
      canvasEl.style.display = 'block';
      typeLayer.style.display = 'none';
    } else {
      canvasEl.style.display = 'none';
      typeLayer.style.display = 'flex';
    }
  });
});

// Typed signature preview
const typedInput = document.getElementById('typedSignature');
const typedPreview = document.getElementById('typedPreview');

typedInput.addEventListener('input', () => {
  typedPreview.innerText = typedInput.value;
});

// PDF generation
function preparePdf() {
  const form = document.getElementById('creditAppForm');

  if (!form.reportValidity()) return;

  const clone = form.cloneNode(true);

  // Convert inputs to text
  const inputs = clone.querySelectorAll('input');

  inputs.forEach(el => {
    const span = document.createElement('span');
    span.innerText = el.value || '';
    el.replaceWith(span);
  });

  // Signature
  const sigCanvas = clone.querySelector('#signaturePad');

  if (sigCanvas) {
    if (savedSignatureData) {
      const img = document.createElement('img');
      img.src = savedSignatureData;
      img.style.height = '80px';
      sigCanvas.replaceWith(img);
    } else {
      sigCanvas.replaceWith(document.createElement('div'));
    }
  }

  const container = document.getElementById('pdf-content');
  container.innerHTML = '';
  container.appendChild(clone);

  setTimeout(() => {
    html2pdf().from(container).save();
  }, 300);
}
</script>

</body>
</html>
